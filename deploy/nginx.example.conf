# Example nginx configuration for Web UI Absensi
# Place this in /etc/nginx/sites-available/ and symlink to sites-enabled/.

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name wflab.web.id *.wflab.web.id;
    return 301 https://$host$request_uri;
}

# HTTPS reverse proxy to the Next.js app on port 3000
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wflab.web.id *.wflab.web.id;

    ssl_certificate     /etc/letsencrypt/live/wflab.web.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wflab.web.id/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Increase body size for logo / Excel imports
    client_max_body_size 10M;

    # Reasonable timeouts for SSE bulk download
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;

    # Disable buffering so SSE events flush immediately
    proxy_buffering     off;
    proxy_cache         off;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/health {
        access_log off;
        proxy_pass http://127.0.0.1:3000;
    }
}
